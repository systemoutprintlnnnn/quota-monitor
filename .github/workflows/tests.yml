# Runs static QA checks plus a release-build smoke check on every push and PR.
#
# Why a single workflow / single job: the project's main risk is upstream
# wire-format drift (Codex CLI app-server JSON-RPC + Anthropic OAuth
# usage payloads) silently breaking the decoder. The static QA suite includes
# Swift tests as the canary, plus shell/Python checks for the local QA and
# release-note helper scripts. It does not launch a GUI app instance.
#
# The release-build step is the second canary: Swift 6 strict concurrency
# + release-mode optimization occasionally surface issues that debug
# (which is what `swift test` uses) misses. Catching them here keeps
# the failure visible on the PR instead of waiting for a tag push to
# invoke release.sh and finding out mid-DMG-build.
#
# macos-15 runner ships Swift 6 (Xcode 16.x) — the project requires
# Swift 6 + StrictConcurrency, so an older runner image won't compile.

name: tests

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

# Cancel in-flight runs for the same ref when a new push lands —
# saves macOS minutes (which are 10x linux on the free tier).
concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  swift-test:
    runs-on: macos-15
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - name: Show toolchain
        # Surface swift / xcode versions in the log so a future Swift-7
        # default on the runner is visible at the top of the run.
        run: |
          swift --version
          xcodebuild -version || true

      - name: Validate PR changelog
        if: github.event_name == 'pull_request'
        run: python3 tools/validate-pr-changelog.py --base "${{ github.event.pull_request.base.sha }}" --head HEAD

      - name: static QA checks
        # Non-GUI gate: shell/Python helper tests, release-note format,
        # whitespace checks, and the Swift test suite. This must not launch
        # a QuotaMonitor.app instance. Visible UI validation is explicit:
        # run an interactive QA setup locally, then use Computer Use.
        run: ./qa/run-static.sh

      - name: swift build -c release (smoke)
        # Belt-and-suspenders check: tests run in debug, but release
        # optimization can expose problems debug never sees (implicit
        # Sendable inference, @inlinable boundaries, etc). Compile only
        # — no app bundle, no DMG. release.yml still does the full
        # build + bundle + DMG on tag push.
        run: swift build -c release
